name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: go test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.24.x"
          - "1.26.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Check module tidiness
        if: matrix.go-version == '1.24.x'
        run: go mod tidy -diff

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Example smoke tests
        run: |
          go run ./examples/quickstart
          go run ./examples/gin-gorm
          go run ./examples/grpc
          go run ./examples/ent

      - name: Race tests
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  integration:
    name: integration (mysql, postgres, redis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Run disposable integration tests
        shell: pwsh
        run: ./tests/run-integration.ps1

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      COVERAGE_PROFILE: ${{ runner.temp }}/gotenancy-coverage.out
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
      - name: Generate atomic coverage profile
        shell: pwsh
        run: go test -count=1 -covermode=atomic -coverpkg=./... -coverprofile=$env:COVERAGE_PROFILE ./...
      - name: Enforce coverage floor
        shell: pwsh
        run: ./tests/check-coverage.ps1 -Profile $env:COVERAGE_PROFILE -Minimum 65
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: gotenancy-coverage
          path: |
            ${{ runner.temp }}/gotenancy-coverage.out
            ${{ runner.temp }}/gotenancy-coverage.out.txt
          if-no-files-found: error
